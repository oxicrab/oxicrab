services:
  oxicrab:
    image: ghcr.io/oxicrab/oxicrab:${OXICRAB_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ${OXICRAB_HOME:-~/.oxicrab}:/home/oxicrab/.oxicrab
    ports:
      - "${OXICRAB_PORT:-18790}:18790"
    environment:
      - OXICRAB_PORT=18790
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Tags: "latest" (all channels), "slack-only" (Slack + no whisper, smaller image)
