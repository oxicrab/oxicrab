name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Change Detection ────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.result.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      # [no ci] skip is restricted to direct pushes (not PRs) to prevent
      # bypass of required checks via PR title manipulation.
      - name: Check for [no ci] in commit message (push only)
        id: skip
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]] && echo "$COMMIT_MSG" | grep -qiF '[no ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dorny/paths-filter@v3
        if: steps.skip.outputs.skip != 'true'
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'fuzz/**'
              - 'cmake/**'
              - 'deploy/**'
              - '.github/workflows/**'
              - '.cargo/**'

      - name: Set code output
        id: result
        run: |
          if [[ "${{ steps.skip.outputs.skip }}" == "true" ]]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Quick Checks (no compilation) ────────────────────────────────
  check:
    name: Format & Advisories
    needs: [changes]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check formatting
        run: cargo fmt -- --check

      - name: cargo-deny advisories
        run: cargo deny check advisories

      - name: Check generated docs are up to date
        run: |
          python3 docs/build.py
          if ! git diff --quiet -- docs/; then
            echo "::error::Generated docs are stale. Run 'python3 docs/build.py' and commit."
            git diff --stat -- docs/
            exit 1
          fi

  # ── Build Debug (Linux only for fast path) ─────────────────────────
  build-linux:
    name: Build Debug (linux)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-linux-debug

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Build (all features)
        run: cargo build --all-targets --all-features --timings

      - name: Build without optional channels
        run: cargo build --no-default-features

      - name: Upload build timings
        uses: actions/upload-artifact@v7
        with:
          name: build-timings-linux
          path: target/cargo-timings/cargo-timing.html

  # ── Clippy (Linux, fast path) ──────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [changes, build-linux]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: clippy

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-linux-debug

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Clippy (SARIF + fail on warnings)
        run: >
          cargo clippy --all-targets --all-features --message-format=json -- -D warnings
          | clippy-sarif
          | tee clippy-results.sarif
          | sarif-fmt

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: clippy-results.sarif
          wait-for-processing: true
        continue-on-error: true

  # ── Unit Tests (Linux, fast path) ──────────────────────────────────
  test-unit:
    name: Unit Tests (linux)
    needs: [changes, build-linux]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-linux-debug

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Run unit tests
        run: cargo nextest run --lib --profile default

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-unit-linux
          path: target/nextest/default/junit-unit.xml
          if-no-files-found: warn

  # ── Integration Tests (Linux, fast path) ───────────────────────────
  test-integration:
    name: Integration Tests (linux)
    needs: [changes, build-linux]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-linux-debug

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Run integration tests
        run: >
          cargo nextest run --profile integration
          --test session_management
          --test cron_jobs
          --test tool_registry
          --test message_flow
          --test config_validation
          --test context_and_skills
          --test error_handling
          --test filesystem_tools
          --test memory_integration
          --test multi_turn_session
          --test shell_exec
          --test tool_context_caching
          --test compaction_integration
          --test safety_integration
        env:
          OXICRAB_HOME: ${{ runner.temp }}/oxicrab-test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-integration-linux
          path: target/nextest/integration/junit-integration.xml
          if-no-files-found: warn

  # ── Test Results (PR annotation) ───────────────────────────────────
  test-results:
    name: Test Results
    runs-on: ubuntu-latest
    needs: [changes, test-unit, test-integration]
    if: always() && needs.changes.outputs.code == 'true'
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: junit-*
          merge-multiple: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "**/*.xml"
          check_name: Test Results
          comment_mode: off

  # ══════════════════════════════════════════════════════════════════
  # Extended jobs (non-blocking, run in parallel with fast path)
  # These provide additional signal but do NOT gate merges.
  # ══════════════════════════════════════════════════════════════════

  # ── macOS Build + Tests ────────────────────────────────────────────
  build-macos:
    name: Build + Test (macos)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-macos-debug

      - name: Install system dependencies
        run: command -v cmake || brew install cmake

      - name: Build (all features)
        run: cargo build --all-targets --all-features
        env:
          CMAKE_PROJECT_INCLUDE: ${{ format('{0}/cmake/disable-ggml-native.cmake', github.workspace) }}

      - name: Run unit tests
        run: cargo nextest run --lib --profile default
        env:
          CMAKE_PROJECT_INCLUDE: ${{ format('{0}/cmake/disable-ggml-native.cmake', github.workspace) }}

      - name: Run integration tests
        run: >
          cargo nextest run --profile integration
          --test session_management
          --test cron_jobs
          --test tool_registry
          --test message_flow
          --test config_validation
          --test context_and_skills
          --test error_handling
          --test filesystem_tools
          --test memory_integration
          --test multi_turn_session
          --test shell_exec
          --test tool_context_caching
          --test compaction_integration
          --test safety_integration
        env:
          OXICRAB_HOME: ${{ runner.temp }}/oxicrab-test
          CMAKE_PROJECT_INCLUDE: ${{ format('{0}/cmake/disable-ggml-native.cmake', github.workspace) }}

  # ── Coverage ────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-coverage

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Generate coverage
        run: >
          cargo llvm-cov
          --all-features
          --workspace
          --lcov
          --output-path lcov.info
          --
          --test-threads=1
        env:
          OXICRAB_HOME: ${{ runner.temp }}/oxicrab-test

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: lcov.info
        continue-on-error: true

  # ── Binary Size ─────────────────────────────────────────────────────
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-release-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu
        env:
          SOURCE_DATE_EPOCH: "1"

      - name: Measure binary size
        id: size
        run: |
          SIZE=$(stat -c%s target/x86_64-unknown-linux-gnu/release/oxicrab)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "bytes=$SIZE" >> "$GITHUB_OUTPUT"
          echo "mb=$SIZE_MB" >> "$GITHUB_OUTPUT"

      - name: Restore baseline size
        if: github.event_name == 'pull_request'
        id: baseline
        uses: actions/cache/restore@v5
        with:
          path: baseline-binary-size.txt
          key: binary-size-baseline-
          restore-keys: binary-size-baseline-

      - name: Compare with baseline
        if: github.event_name == 'pull_request' && steps.baseline.outputs.cache-hit == 'true'
        run: |
          BASELINE=$(cat baseline-binary-size.txt)
          CURRENT=${{ steps.size.outputs.bytes }}
          DELTA=$((CURRENT - BASELINE))
          DELTA_KB=$(echo "scale=1; $DELTA / 1024" | bc)
          if [ $DELTA -gt 0 ]; then
            SIGN="+"
          else
            SIGN=""
          fi
          echo "### Binary Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Current | ${{ steps.size.outputs.mb }} MB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Baseline | $(echo "scale=2; $BASELINE / 1048576" | bc) MB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Delta | ${SIGN}${DELTA_KB} KB |" >> "$GITHUB_STEP_SUMMARY"

      - name: Report size (no baseline)
        if: github.event_name != 'pull_request' || steps.baseline.outputs.cache-hit != 'true'
        run: |
          echo "### Binary Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | ${{ steps.size.outputs.mb }} MB |" >> "$GITHUB_STEP_SUMMARY"

      - name: Save baseline (main only)
        if: github.ref == 'refs/heads/main'
        run: echo "${{ steps.size.outputs.bytes }}" > baseline-binary-size.txt

      - name: Cache baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: baseline-binary-size.txt
          key: binary-size-baseline-${{ github.sha }}

  # ── Package (Linux) ─────────────────────────────────────────────────
  package-linux:
    name: Package (linux)
    runs-on: ubuntu-latest
    needs: [changes, binary-size]
    if: needs.changes.outputs.code == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-release-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Build release binary (cache hit = no-op)
        run: cargo build --release --target x86_64-unknown-linux-gnu
        env:
          SOURCE_DATE_EPOCH: "1"

      - name: Build DEB package
        run: |
          cargo install cargo-deb --force
          cargo deb --no-build --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/debian/*.deb .

      - name: Validate DEB package
        run: |
          sudo apt-get install -y lintian
          lintian --tag-display-limit 0 *.deb || true
          ! lintian *.deb 2>&1 | grep -q '^E:'

      - name: Build RPM package
        run: |
          cargo install cargo-generate-rpm --force
          cargo generate-rpm --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/generate-rpm/*.rpm .

      - name: Validate RPM package
        run: |
          sudo apt-get install -y rpmlint
          rpmlint -c deploy/rpm/rpmlint.toml *.rpm
          rpm -qpl *.rpm || true

  # ── Package (macOS) ─────────────────────────────────────────────────
  package-macos:
    name: Package (macos)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-macos-release

      - name: Install system dependencies
        run: command -v cmake || brew install cmake

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          SOURCE_DATE_EPOCH: "1"
          CMAKE_PROJECT_INCLUDE: ${{ format('{0}/cmake/disable-ggml-native.cmake', github.workspace) }}

      - name: Build DMG
        run: |
          mkdir -p dmg-staging
          cp "target/aarch64-apple-darwin/release/oxicrab" dmg-staging/
          cp deploy/com.oxicrab.gateway.plist dmg-staging/
          cp config.example.json dmg-staging/
          cp README.md LICENSE dmg-staging/
          hdiutil create -volname "Oxicrab CI" \
            -srcfolder dmg-staging -ov -format UDZO \
            "oxicrab-ci-arm64.dmg"

      - name: Validate DMG
        run: hdiutil verify "oxicrab-ci-arm64.dmg"

  # ── Fuzz Testing ─────────────────────────────────────────────────
  fuzz:
    name: Fuzz Testing
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-fuzz

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Fuzz webhook signature (30s)
        run: cargo fuzz run fuzz_webhook_signature -- -max_total_time=30
        working-directory: fuzz
        continue-on-error: true

      - name: Fuzz config parse (30s)
        run: cargo fuzz run fuzz_config_parse -- -max_total_time=30
        working-directory: fuzz
        continue-on-error: true

      - name: Fuzz prompt guard (30s)
        run: cargo fuzz run fuzz_prompt_guard -- -max_total_time=30
        working-directory: fuzz
        continue-on-error: true

      - name: Fuzz leak detector (30s)
        run: cargo fuzz run fuzz_leak_detector -- -max_total_time=30
        working-directory: fuzz
        continue-on-error: true

      - name: Fuzz URL validation (30s)
        run: cargo fuzz run fuzz_url_validation -- -max_total_time=30
        working-directory: fuzz
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════════
  # CI Gate — required for merge
  # Only fast-path jobs block. Extended jobs report but don't gate.
  # ══════════════════════════════════════════════════════════════════
  ci-gate:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, check, clippy, test-unit, test-integration, build-linux]
    steps:
      - name: Check results
        run: |
          echo "changes.code: ${{ needs.changes.outputs.code }}"
          echo "check: ${{ needs.check.result }}"
          echo "clippy: ${{ needs.clippy.result }}"
          echo "test-unit: ${{ needs.test-unit.result }}"
          echo "test-integration: ${{ needs.test-integration.result }}"
          echo "build-linux: ${{ needs.build-linux.result }}"

          # check always runs — must pass
          if [[ "${{ needs.check.result }}" == "failure" || "${{ needs.check.result }}" == "cancelled" ]]; then
            echo "::error::check failed"
            exit 1
          fi

          # Code-gated jobs: fail on failure/cancelled, accept skipped (docs-only changes)
          for job in clippy test-unit test-integration build-linux; do
            result="${{ needs[job].result }}"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::${job} failed"
              exit 1
            fi
          done
