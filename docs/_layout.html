<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="theme-color" content="#ea580c">
  <link rel="icon" href="oxicrab.png">
  <style>
    :root {
      --bg: #faf8f5; --bg-alt: #f5f0eb; --bg-dark: #1c1917;
      --text: #1c1917; --text-muted: #78716c; --text-light: #a8a29e;
      --accent: #ea580c; --accent-dark: #c2410c; --accent-light: #fed7aa;
      --coral: #f97066; --teal: #0d9488; --teal-light: #5eead4;
      --border: #e7e5e4; --surface: #fffbf5;
      --code-bg: #292524; --code-text: #e7e5e4;
      --max-w: {{MAX_WIDTH}};
      --mono: 'IBM Plex Mono', 'SF Mono', 'Cascadia Code', Consolas, monospace;
      --heading: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* NOISE TEXTURE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      background: rgba(250,248,245,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0 2rem;
    }
    .nav-inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-logo img { image-rendering: pixelated; }
    .nav-logo .oxi { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
      padding-bottom: 2px;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }

    /* TOC */
    .toc {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 14px 12px 16px 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 3rem;
    }
    .toc-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }
    .toc ul { list-style: none; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .toc a {
      display: inline-block;
      padding: 0.35rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .toc a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #fff7ed;
    }

    /* PAGE LAYOUT */
    .page-header { padding: 4rem 2rem 2rem; max-width: var(--max-w); margin: 0 auto; }
    .page-header h1 {
      font-family: var(--heading);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    .page-header p { color: var(--text-muted); font-size: 1.1rem; }
    .content { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem 4rem; }

    /* CODE */
    pre {
      background: var(--code-bg);
      border-radius: 10px 12px 10px 14px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--code-text);
      margin: 0.75rem 0 1rem;
    }
    code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: var(--bg-alt);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--accent-dark);
    }
    pre code { background: none; padding: 0; color: inherit; }

    /* COMPONENTS */
    .note {
      background: rgba(234,88,12,0.05);
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      border-radius: 0 8px 8px 0;
      margin: 1rem 0;
      font-size: 0.85rem;
      color: var(--text);
    }
    .note strong { color: var(--accent); }
    .config-block { margin: 1rem 0; }
    .config-label { font-family: var(--mono); font-size: 0.7rem; color: var(--text-light); margin-bottom: 0.25rem; }

    /* LISTS */
    ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    ol li { margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text); }
    ol li strong { color: var(--text); }

    /* FOOTER */
    footer {
      background: var(--bg-dark);
      padding: 3rem 2rem;
      color: #a8a29e;
    }
    .footer-inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: #a8a29e; text-decoration: none; font-size: 0.8rem; transition: color 0.2s; }
    .footer-links a:hover { color: #fef2f2; }
    .footer-links a.active {
      color: #fef2f2;
      text-decoration: underline;
      pointer-events: none;
      cursor: default;
    }
    .footer-copy { color: #78716c; font-size: 0.75rem; }
    .footer-copy a { color: var(--accent); text-decoration: none; }
    .footer-copy a:hover { text-decoration: underline; }
    footer .nav-logo { color: #e7e5e4; }
    footer .nav-logo .oxi { color: var(--accent); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav-links { gap: 1rem; }
      .page-header h1 { font-size: 1.75rem; }
      .toc ul { flex-direction: column; }
      .footer-inner { flex-direction: column; gap: 1rem; }
    }

    /* PAGE-SPECIFIC CSS */
{{PAGE_CSS}}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
